{% extends "layout.html" %}
{% block title %}Sign In{% endblock %}
{% block body %}
  <h1>Sign in</h1>
  <p>Use a magic link (primary) or password fallback.</p>

  <section class="panel">
    <h2>Magic Link</h2>
    <form method="post" action="{{ url_for('auth.request_magic_link') }}" class="stack">
      <label>Email
        <input type="email" name="email" required autocomplete="email" />
      </label>
      <label class="checkbox-row">
        <input type="checkbox" name="remember_me" />
        Remember me after I sign in
      </label>
      <button type="submit">Send Magic Link</button>
    </form>
  </section>

  <section class="panel">
    <h2>Password</h2>
    <form method="post" action="{{ url_for('auth.password_login') }}" class="stack">
      <label>Email
        <input type="email" name="email" required autocomplete="email" />
      </label>
      <label>Password
        <input type="password" name="password" required autocomplete="current-password" />
      </label>
      <label class="checkbox-row">
        <input type="checkbox" name="remember_me" />
        Remember me
      </label>
      <button type="submit">Sign In</button>
    </form>
  </section>
{% endblock %}
