{% extends "layout.html" %}
{% block title %}Check Your Email{% endblock %}
{% block body %}
  <div style="text-align:center; max-width:400px; margin:2rem auto;">
    <h1>Check Your Email</h1>
    <p>We sent you a sign-in link. Click it on any device and this page will automatically log you in.</p>

    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" style="margin:1.5rem auto; animation:spin 1s linear infinite;">
      <circle cx="12" cy="12" r="10" stroke="var(--border)" stroke-width="4"></circle>
      <path d="M4 12a8 8 0 018-8" stroke="var(--accent)" stroke-width="4" stroke-linecap="round"></path>
    </svg>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <p id="status-text" style="color:#6b7280; font-size:0.875rem;">Waiting for login&hellip;</p>

    <p style="margin-top:2rem; font-size:0.875rem; color:#6b7280;">
      Didn't receive it?
      <a href="{{ url_for('auth.login') }}" style="color:var(--accent);">Try again</a>
    </p>
  </div>

  <script>
  (function() {
    var checkUrl = {{ url_for('auth.check_magic_link') | tojson }};
    var loginUrl = {{ url_for('auth.login') | tojson }};
    var statusText = document.getElementById('status-text');
    var interval = setInterval(function() {
      fetch(checkUrl)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.status === 'authenticated') {
            clearInterval(interval);
            statusText.textContent = 'Logged in! Redirecting\u2026';
            window.location.href = data.redirect;
          } else if (data.status === 'expired') {
            clearInterval(interval);
            statusText.textContent = 'Link expired.';
            window.location.href = loginUrl;
          } else if (data.status === 'error') {
            clearInterval(interval);
            window.location.href = loginUrl;
          }
        })
        .catch(function() {});
    }, 3000);
  })();
  </script>
{% endblock %}
