<section id="pricing-catalog-card" class="quote-editor-section">
  <h2>Pricing Catalog</h2>
  {% if not sections %}
    <p>No pricing rows found.</p>
  {% else %}
    <div class="tabbar">
      {% for section in sections %}
        <button
          type="button"
          class="pricing-tab-btn {% if loop.first %}active{% endif %}"
          data-tab-target="pricing-tab-{{ section.product_type }}"
        >
          {{ section.title }}
        </button>
      {% endfor %}
    </div>

    {% for section in sections %}
      <section id="pricing-tab-{{ section.product_type }}" class="pricing-tab-panel {% if loop.first %}active{% endif %}">
        <h3>{{ section.title }}</h3>
        <table class="pricing-table">
          <thead>
            <tr>
              <th>Rate Key</th>
              <th>Price</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {% for row in section.entries %}
              {% include "partials/pricing_row.html" %}
            {% endfor %}
          </tbody>
        </table>
      </section>
    {% endfor %}
  {% endif %}
</section>

<style>
  .pricing-tab-btn {
    border: 1px solid #cbd5e1;
    background: #f8fafc;
    color: #1f2937;
    border-radius: 999px;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    font-weight: 600;
  }
  .pricing-tab-btn.active {
    background: #0f766e;
    color: #ffffff;
    border-color: #0f766e;
  }
  .pricing-tab-panel {
    display: none;
  }
  .pricing-tab-panel.active {
    display: block;
  }
  .pricing-table {
    width: 100%;
    border-collapse: collapse;
  }
  .pricing-table th,
  .pricing-table td {
    border-bottom: 1px solid #e5e7eb;
    text-align: left;
    padding: 0.6rem;
    vertical-align: middle;
  }
  .price-input {
    width: 120px;
    padding: 0.35rem 0.45rem;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    font-size: 0.95rem;
  }
  .save-btn {
    border: 1px solid #0f766e;
    background: #0f766e;
    color: #fff;
    border-radius: 6px;
    padding: 0.35rem 0.7rem;
    cursor: pointer;
  }
  @media (max-width: 640px) {
    .pricing-table th:nth-child(3),
    .pricing-table td:nth-child(3) {
      width: 1%;
      white-space: nowrap;
    }
    .price-input {
      width: 90px;
    }
  }
</style>
<script>
  (function() {
    const root = document.getElementById("pricing-catalog-card");
    if (!root) return;
    const tabs = root.querySelectorAll(".pricing-tab-btn");
    const panels = root.querySelectorAll(".pricing-tab-panel");
    tabs.forEach((btn) => {
      btn.addEventListener("click", () => {
        const target = btn.dataset.tabTarget;
        tabs.forEach((tab) => tab.classList.remove("active"));
        panels.forEach((panel) => panel.classList.remove("active"));
        btn.classList.add("active");
        const panel = root.querySelector("#" + target);
        if (panel) panel.classList.add("active");
      });
    });
  })();
</script>
