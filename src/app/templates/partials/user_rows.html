{% if users %}
  {% for user in users %}
    <tr>
      <td>{{ user.name }}</td>
      <td>{{ user.email }}</td>
      <td>{{ user.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
      <td>
        <form
          method="post"
          action="{{ url_for('admin.delete_user', user_id=user.id) }}"
          hx-post="{{ url_for('admin.delete_user', user_id=user.id) }}"
          hx-target="#user-list"
          hx-swap="innerHTML"
        >
          <button type="submit" class="danger" {% if current_user.id == user.id %}disabled{% endif %}>Remove</button>
        </form>
      </td>
    </tr>
  {% endfor %}
{% else %}
  <tr>
    <td colspan="4">No users found.</td>
  </tr>
{% endif %}
