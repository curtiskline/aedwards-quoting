<tr id="pricing-row-{{ row.id }}">
  <td>{{ row.label }}</td>
  <td>
    <form
      hx-post="/admin/pricing/{{ row.id }}"
      hx-target="#pricing-row-{{ row.id }}"
      hx-swap="outerHTML"
    >
      <input
        class="price-input"
        name="price"
        type="number"
        min="0"
        step="0.01"
        value="{{ '%.2f'|format(row.price) }}"
        required
      />
      <button class="save-btn" type="submit">Save</button>
    </form>
  </td>
  <td>${{ '%.2f'|format(row.price) }}</td>
</tr>
