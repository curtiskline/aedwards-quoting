<tr id="pricing-row-{{ row.id }}">
  <td>
    {{ row.label }}
    <details class="pricing-edit-details">
      <summary>Edit rate details</summary>
      <form hx-post="/admin/pricing/{{ row.id }}" hx-target="#pricing-row-{{ row.id }}" hx-swap="outerHTML" class="pricing-key-form">
        <input type="hidden" name="edit_key_fields" value="true" />
        {% if row.product_type == "sleeve" %}
          <label>Wall thickness <input name="wall_thickness" type="number" min="0" step="0.0001" value="{{ row.key_fields.get('wall_thickness', '') }}" required /></label>
          <label>Grade <input name="grade" type="number" min="0" step="1" value="{{ row.key_fields.get('grade', '') }}" required /></label>
        {% elif row.product_type == "girth_weld" %}
          <label>Min diameter <input name="min_diameter" type="number" min="0" step="0.01" value="{{ row.key_fields.get('min_diameter', '') }}" required /></label>
          <label>Max diameter <input name="max_diameter" type="number" min="0" step="0.01" value="{{ row.key_fields.get('max_diameter', '') }}" required /></label>
        {% elif row.product_type == "bag" %}
          <label>Part number <input name="part_number" value="{{ row.key_fields.get('part_number', '') }}" required /></label>
          <label>Min pipe size <input name="pipe_size_min" type="number" min="0" step="0.01" value="{{ row.key_fields.get('pipe_size_min', '') }}" required /></label>
          <label>Max pipe size <input name="pipe_size_max" type="number" min="0" step="0.01" value="{{ row.key_fields.get('pipe_size_max', '') }}" required /></label>
          <label>Pieces/pallet <input name="pieces_per_pallet" type="number" min="0" step="1" value="{{ row.key_fields.get('pieces_per_pallet', '') }}" required /></label>
        {% else %}
          <label>Rate name <input name="key" value="{{ row.key_fields.get('key', '') }}" required /></label>
          <label>Unit <input name="unit" value="{{ row.key_fields.get('unit', '') }}" /></label>
        {% endif %}
        <label>Price <input class="price-input" name="price" type="number" min="0" step="0.01" value="{{ '%.2f'|format(row.price) }}" required /></label>
        <button class="save-btn" type="submit">Save details</button>
      </form>
    </details>
  </td>
  <td>
    <form hx-post="/admin/pricing/{{ row.id }}" hx-target="#pricing-row-{{ row.id }}" hx-swap="outerHTML">
      <input class="price-input" name="price" type="number" min="0" step="0.01" value="{{ '%.2f'|format(row.price) }}" required />
      <button class="save-btn" type="submit">Save</button>
    </form>
  </td>
  <td>
    ${{ '%.2f'|format(row.price) }}
    <form hx-post="/admin/pricing/{{ row.id }}/delete" hx-target="#pricing-catalog-card" hx-swap="outerHTML" class="pricing-delete-form" onsubmit="return confirm('Delete this pricing row?');">
      <button type="submit" class="delete-btn">Delete</button>
    </form>
  </td>
</tr>
