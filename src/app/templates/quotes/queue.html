{% extends "layout.html" %}
{% block title %}Quote Queue{% endblock %}
{% block body %}
<style>
  .queue-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .tabs { display: flex; gap: 0.25rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .tab {
    padding: 0.4rem 0.75rem; border-radius: 6px; border: 1px solid #d1d5db;
    background: #fff; color: #374151; font-size: 0.875rem; cursor: pointer;
    text-decoration: none; font-weight: 500;
  }
  .tab:hover { background: #f3f4f6; }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tab .count { font-size: 0.75rem; opacity: 0.8; margin-left: 0.25rem; }
  .search-box {
    width: 100%; padding: 0.5rem; border: 1px solid #d1d5db;
    border-radius: 6px; font-size: 1rem; margin-bottom: 1rem;
  }
  .quote-card {
    display: grid; grid-template-columns: 1fr auto;
    gap: 0.5rem; padding: 0.75rem 1rem;
    border: 1px solid #e5e7eb; border-radius: 8px;
    margin-bottom: 0.5rem; background: #fff;
    transition: box-shadow 0.15s;
  }
  .quote-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .quote-card .top-row {
    display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
  }
  .quote-number { font-weight: 700; color: var(--accent); }
  .customer-name { font-weight: 500; }
  .meta { font-size: 0.85rem; color: #6b7280; display: flex; gap: 1rem; flex-wrap: wrap; }
  .status-badge {
    display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px;
    font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
  }
  .status-new { background: #dbeafe; color: #1d4ed8; }
  .status-in_review { background: #fef3c7; color: #92400e; }
  .status-needs_pricing { background: #fecaca; color: #991b1b; }
  .status-ready { background: #d1fae5; color: #065f46; }
  .status-sent { background: #e0e7ff; color: #3730a3; }
  .status-archived { background: #f3f4f6; color: #6b7280; }
  .reviewer-tag {
    font-size: 0.75rem; color: #92400e; background: #fef3c7;
    padding: 0.1rem 0.5rem; border-radius: 999px;
  }
  .amount { font-weight: 600; text-align: right; white-space: nowrap; }
  .amount.needs-pricing { color: #dc2626; font-style: italic; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: #9ca3af; }

  .quote-editor {
    display: grid;
    gap: 1rem;
  }
  .quote-editor-status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .quote-editor-status-actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .quote-editor-status-actions form,
  .quote-editor-status-actions a {
    margin: 0;
  }
  .quote-editor-section {
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 1rem;
    background: #fff;
    display: grid;
    gap: 0.8rem;
  }
  .quote-editor-section h2 {
    margin: 0;
    font-size: 1.1rem;
  }
  .quote-editor-grid {
    display: grid;
    gap: 0.75rem;
  }
  .quote-editor-grid-wide {
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  }
  .quote-editor-grid-two-col {
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  }
  .quote-editor label,
  .line-item-card label,
  .add-line-item-card label {
    display: grid;
    gap: 0.25rem;
    font-size: 0.9rem;
    color: #374151;
  }
  .quote-editor input,
  .quote-editor select,
  .quote-editor textarea {
    width: 100%;
    box-sizing: border-box;
    min-height: 2.15rem;
  }
  .quote-editor textarea {
    min-height: 6rem;
    resize: vertical;
  }
  .line-items-section {
    gap: 1rem;
  }
  .line-item-list {
    display: grid;
    gap: 0.9rem;
  }
  .line-item-card {
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 0.9rem;
    background: #fff;
    display: grid;
    gap: 0.7rem;
  }
  .line-item-card.needs-pricing {
    background: #fff1f2;
    border-color: #fecdd3;
  }
  .line-item-form {
    display: grid;
    gap: 0.7rem;
  }
  .line-item-row {
    display: grid;
    gap: 0.6rem;
  }
  .line-item-row-top {
    grid-template-columns: minmax(150px, 1fr) minmax(260px, 2fr) minmax(180px, 1fr);
  }
  .line-item-row-pricing {
    grid-template-columns: minmax(110px, 0.8fr) minmax(140px, 1fr) minmax(140px, 0.9fr) minmax(220px, 1.6fr);
    align-items: end;
  }
  .line-item-row-specs {
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    align-items: end;
  }
  .line-item-spec-check {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    min-height: 2.15rem;
  }
  .line-item-spec-check input {
    width: auto;
    min-height: unset;
  }
  .line-item-total {
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 0.45rem 0.6rem;
    background: #f9fafb;
    display: grid;
    gap: 0.2rem;
  }
  .line-item-static {
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 0.45rem 0.6rem;
    background: #f9fafb;
    display: grid;
    align-content: center;
    gap: 0.2rem;
  }
  .line-item-static span {
    font-size: 0.8rem;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .line-item-total span {
    font-size: 0.8rem;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .line-item-pricing-meta {
    font-size: 0.85rem;
    color: #374151;
    display: grid;
    gap: 0.15rem;
  }
  .pricing-note-warn { color: #b45309; }
  .pricing-note { color: #4b5563; }
  .pricing-note-critical { color: #be123c; font-weight: 700; }
  .line-item-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.4rem;
    flex-wrap: wrap;
    border-top: 1px solid #f3f4f6;
    padding-top: 0.65rem;
  }
  .line-item-actions form {
    margin: 0;
  }
  .line-item-actions > button {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .add-line-item-card {
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 1rem;
    background: #fff;
    display: grid;
    gap: 0.75rem;
  }
  .add-line-item-card h3 {
    margin: 0;
    font-size: 1rem;
  }
  .add-line-item-grid {
    display: grid;
    gap: 0.7rem;
    grid-template-columns: minmax(150px, 1fr) minmax(240px, 2fr) minmax(120px, 0.8fr) minmax(140px, 1fr);
  }
  .line-item-totals {
    margin-top: 0.25rem;
    text-align: right;
    display: grid;
    gap: 0.2rem;
  }
  @media (max-width: 900px) {
    .line-item-row-top,
    .line-item-row-pricing,
    .add-line-item-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }
  @media (max-width: 640px) {
    .queue-header {
      align-items: flex-start;
    }
    .quote-editor-status-actions {
      width: 100%;
    }
    .quote-editor-status-actions > form,
    .quote-editor-status-actions > a,
    .quote-editor-status-actions > button {
      flex: 1 1 calc(50% - 0.5rem);
    }
    .line-item-row-top,
    .line-item-row-pricing,
    .line-item-row-specs,
    .add-line-item-grid {
      grid-template-columns: 1fr;
    }
    .line-item-actions {
      justify-content: stretch;
    }
    .line-item-actions > button,
    .line-item-actions form {
      flex: 1 1 auto;
    }
    .line-item-actions form button {
      width: 100%;
    }
  }
</style>

<div class="queue-header">
  <h1 style="margin:0">Quote Queue Dashboard</h1>
</div>

<div id="queue-container"
     hx-get="/quotes/?status={{ active_status }}&q={{ search }}"
     hx-trigger="every 30s"
     hx-target="#queue-body"
     hx-select="#queue-body"
     hx-swap="outerHTML">

  <div class="tabs" id="status-tabs">
    {% for tab in tabs %}
    <a class="tab{% if tab.key == active_status %} active{% endif %}"
       href="#"
       hx-get="/quotes/?status={{ tab.key }}&q={{ search }}"
       hx-target="#queue-body"
       hx-select="#queue-body"
       hx-swap="outerHTML"
       hx-push-url="/quotes/?status={{ tab.key }}">
      {{ tab.label }} <span class="count">({{ tab.count }})</span>
    </a>
    {% endfor %}
  </div>

  <input type="search" name="q" value="{{ search }}" placeholder="Search by customer or quote number..."
         class="search-box"
         hx-get="/quotes/?status={{ active_status }}"
         hx-target="#queue-body"
         hx-select="#queue-body"
         hx-swap="outerHTML"
         hx-trigger="input changed delay:300ms"
         hx-include="this">

  {% include "quotes/_queue_body.html" %}
</div>
{% endblock %}
