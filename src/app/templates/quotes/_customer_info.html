<section id="editor-customer-info" class="quote-editor-section">
  <h2>Customer Info</h2>
  <form method="post" action="/quotes/{{ quote.id }}/customer" hx-post="/quotes/{{ quote.id }}/customer" hx-target="#editor-customer-info" hx-swap="outerHTML">
    <div class="quote-editor-grid quote-editor-grid-wide">
      <label>Company <input name="customer_name_raw" value="{{ quote.customer_name_raw or '' }}" /></label>
      <label>Contact <input name="contact_name" value="{{ quote.contact_name or '' }}" /></label>
      <label>Email <input name="contact_email" value="{{ quote.contact_email or '' }}" /></label>
      <label>Phone <input name="contact_phone" value="{{ quote.contact_phone or '' }}" /></label>
      <label>Ship To Address 1 <input name="ship_to_address_line1" value="{{ (quote.ship_to_json or {}).get('address_line1', '') }}" /></label>
      <label>Ship To Address 2 <input name="ship_to_address_line2" value="{{ (quote.ship_to_json or {}).get('address_line2', '') }}" /></label>
      <label>City <input name="ship_to_city" value="{{ (quote.ship_to_json or {}).get('city', '') }}" /></label>
      <label>State <input name="ship_to_state" value="{{ (quote.ship_to_json or {}).get('state', '') }}" /></label>
      <label>ZIP <input name="ship_to_postal_code" value="{{ (quote.ship_to_json or {}).get('postal_code', '') }}" /></label>
      <label>Country <input name="ship_to_country" value="{{ (quote.ship_to_json or {}).get('country', '') }}" /></label>
    </div>
    <button type="submit">Save Customer Info</button>
  </form>
  <script>
    (() => {
      const section = document.getElementById("editor-customer-info");
      if (!section) return;
      const form = section.querySelector("form");
      if (!form) return;

      let idleTimer = null;
      let leaveTimer = null;

      function triggerSave() {
        clearTimeout(idleTimer);
        clearTimeout(leaveTimer);
        if (window.htmx) window.htmx.trigger(form, "submit");
      }

      // Save 5s after last keystroke, even without tabbing off.
      form.addEventListener("input", () => {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(triggerSave, 5000);
      });
      form.addEventListener("change", () => {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(triggerSave, 5000);
      });

      // Also save promptly when focus leaves the form.
      form.addEventListener("focusout", () => {
        clearTimeout(leaveTimer);
        leaveTimer = setTimeout(() => {
          if (form.contains(document.activeElement)) return;
          triggerSave();
        }, 200);
      });
      form.addEventListener("focusin", () => clearTimeout(leaveTimer));

      // Cancel pending timers once htmx fires so we don't double-submit.
      form.addEventListener("htmx:beforeRequest", () => {
        clearTimeout(idleTimer);
        clearTimeout(leaveTimer);
      });
    })();
  </script>
</section>
