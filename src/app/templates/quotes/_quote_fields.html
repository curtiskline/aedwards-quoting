<section id="editor-quote-fields" class="quote-editor-section">
  <h2>Quote Fields</h2>
  <form method="post" action="/quotes/{{ quote.id }}/meta" hx-post="/quotes/{{ quote.id }}/meta" hx-target="#editor-quote-fields" hx-swap="outerHTML">
    <div class="quote-editor-grid quote-editor-grid-wide">
      <label>Quote Number <input name="quote_number" value="{{ quote.quote_number }}" /></label>
      <label>Project Name <input name="project_name" value="{{ quote.project_name or '' }}" /></label>
    </div>
    <div class="quote-editor-grid quote-editor-grid-two-col">
      <label>Customer Notes <textarea name="notes_customer" rows="3">{{ quote.notes_customer or '' }}</textarea></label>
      <label>Internal Notes <textarea name="notes_internal" rows="3">{{ quote.notes_internal or '' }}</textarea></label>
    </div>
    <button type="submit">Save Quote Fields</button>
  </form>
  <script>
    (() => {
      const section = document.getElementById("editor-quote-fields");
      if (!section) return;
      const form = section.querySelector("form");
      if (!form) return;

      let idleTimer = null;
      let leaveTimer = null;

      function triggerSave() {
        clearTimeout(idleTimer);
        clearTimeout(leaveTimer);
        if (window.htmx) window.htmx.trigger(form, "submit");
      }

      // Save 5s after last keystroke, even without tabbing off.
      form.addEventListener("input", () => {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(triggerSave, 5000);
      });
      form.addEventListener("change", () => {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(triggerSave, 5000);
      });

      // Also save promptly when focus leaves the form.
      form.addEventListener("focusout", () => {
        clearTimeout(leaveTimer);
        leaveTimer = setTimeout(() => {
          if (form.contains(document.activeElement)) return;
          triggerSave();
        }, 200);
      });
      form.addEventListener("focusin", () => clearTimeout(leaveTimer));

      // Cancel pending timers once htmx fires so we don't double-submit.
      form.addEventListener("htmx:beforeRequest", () => {
        clearTimeout(idleTimer);
        clearTimeout(leaveTimer);
      });
    })();
  </script>
</section>
