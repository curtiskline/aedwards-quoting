<div style="display:flex;gap:0.5rem;margin-bottom:0.5rem;flex-wrap:wrap">
  <input type="text" name="contact_name" placeholder="Name *"
         value="{{ contact.name if contact else (c.name if c is defined and c else '') }}"
         style="flex:1;min-width:120px;padding:0.4rem;border:1px solid #d1d5db;border-radius:4px">
  <input type="email" name="contact_email" placeholder="Email *"
         value="{{ contact.email if contact else (c.email if c is defined and c else '') }}"
         style="flex:1;min-width:160px;padding:0.4rem;border:1px solid #d1d5db;border-radius:4px">
  <input type="text" name="contact_phone" placeholder="Phone"
         value="{{ contact.phone if contact else (c.phone if c is defined and c else '') }}"
         style="flex:1;min-width:120px;padding:0.4rem;border:1px solid #d1d5db;border-radius:4px">
</div>
